<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="Heebo, Arial, sans-serif" direction="rtl">
  <rect width="1200" height="520" fill="#07090a"/>

  <!-- grid -->
  <g stroke="#1a2838" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
  </g>

  <!-- Firebase core in center -->
  <g transform="translate(600,260)">
    <circle r="110" fill="none" stroke="#3dff52" stroke-width="1" opacity="0.15"/>
    <circle r="80" fill="none" stroke="#3dff52" stroke-width="1" opacity="0.3"/>
    <circle r="58" fill="rgba(61,255,82,0.08)" stroke="#3dff52" stroke-width="2"/>
    <text y="-8" text-anchor="middle" font-size="14" font-weight="900" fill="#3dff52">FIREBASE</text>
    <text y="12" text-anchor="middle" font-size="10" font-weight="700" fill="#3dff52" letter-spacing="1">REALTIME DB + AUTH</text>
    <text y="30" text-anchor="middle" font-size="9" fill="#9ab8c8">FCM · APNs · Cloud Messaging</text>
  </g>

  <!-- Command console -->
  <g transform="translate(120,180)">
    <rect width="200" height="160" rx="8" fill="#0d1014" stroke="#243448"/>
    <rect width="4" height="160" fill="#3dff52"/>
    <text x="180" y="28" text-anchor="end" font-size="11" font-weight="700" fill="#5a7a90" letter-spacing="2">◉ חמ״ל</text>
    <text x="180" y="60" text-anchor="end" font-size="18" font-weight="900" fill="#d8eef8">קונסולת פיקוד</text>
    <text x="180" y="84" text-anchor="end" font-size="12" fill="#9ab8c8">ווב · PWA · דסקטופ</text>
    <text x="180" y="112" text-anchor="end" font-size="11" fill="#3dff52">19 מודולים</text>
    <text x="180" y="130" text-anchor="end" font-size="11" fill="#3dff52">תצוגה ריבוי־צגים</text>
    <text x="180" y="148" text-anchor="end" font-size="11" fill="#3dff52">פאנל ניהול מלא</text>
  </g>

  <!-- Field - iOS -->
  <g transform="translate(880,80)">
    <rect width="200" height="140" rx="8" fill="#0d1014" stroke="#243448"/>
    <rect width="4" height="140" fill="#29c5f6"/>
    <text x="180" y="28" text-anchor="end" font-size="11" font-weight="700" fill="#5a7a90" letter-spacing="2">◉ שטח · iOS</text>
    <text x="180" y="60" text-anchor="end" font-size="18" font-weight="900" fill="#d8eef8">מפעיל iOS</text>
    <text x="180" y="84" text-anchor="end" font-size="12" fill="#9ab8c8">iPhone · iPad</text>
    <text x="180" y="108" text-anchor="end" font-size="11" fill="#29c5f6">פוש APNs</text>
    <text x="180" y="124" text-anchor="end" font-size="11" fill="#29c5f6">מיקום ברקע · Haptics</text>
  </g>

  <!-- Field - Android -->
  <g transform="translate(880,300)">
    <rect width="200" height="140" rx="8" fill="#0d1014" stroke="#243448"/>
    <rect width="4" height="140" fill="#b06cf0"/>
    <text x="180" y="28" text-anchor="end" font-size="11" font-weight="700" fill="#5a7a90" letter-spacing="2">◉ שטח · אנדרואיד</text>
    <text x="180" y="60" text-anchor="end" font-size="18" font-weight="900" fill="#d8eef8">מפעיל אנדרואיד</text>
    <text x="180" y="84" text-anchor="end" font-size="12" fill="#9ab8c8">Play Store · APK · MDM</text>
    <text x="180" y="108" text-anchor="end" font-size="11" fill="#b06cf0">פוש FCM · Doze bypass</text>
    <text x="180" y="124" text-anchor="end" font-size="11" fill="#b06cf0">מכשירי שטח מחוספסים</text>
  </g>

  <!-- connectors -->
  <g stroke-width="2" fill="none">
    <path d="M 320 260 L 540 260" stroke="#3dff52" stroke-dasharray="4,3"/>
    <path d="M 660 260 Q 770 260 880 150" stroke="#29c5f6" stroke-dasharray="4,3"/>
    <path d="M 660 260 Q 770 260 880 370" stroke="#b06cf0" stroke-dasharray="4,3"/>
  </g>

  <!-- direction arrows -->
  <g font-size="10" font-weight="800" letter-spacing="2">
    <text x="430" y="250" fill="#3dff52" text-anchor="middle">⇌ SYNC &lt;1s</text>
    <text x="790" y="180" fill="#29c5f6" text-anchor="middle">⇌ APNs</text>
    <text x="790" y="340" fill="#b06cf0" text-anchor="middle">⇌ FCM</text>
  </g>

  <!-- title -->
  <text x="600" y="50" text-anchor="middle" font-size="20" font-weight="900" fill="#d8eef8">ארכיטקטורת סנכרון · ONE SOURCE OF TRUTH</text>
  <text x="600" y="72" text-anchor="middle" font-size="11" fill="#5a7a90" letter-spacing="3">REALTIME · ENCRYPTED · AUDITABLE</text>

  <!-- bottom facts -->
  <g transform="translate(120,460)" font-size="11" font-weight="700">
    <text x="0" y="0" fill="#5a7a90" letter-spacing="2">◉ TLS 1.3</text>
    <text x="160" y="0" fill="#5a7a90" letter-spacing="2">◉ ROLE-BASED ACCESS</text>
    <text x="400" y="0" fill="#5a7a90" letter-spacing="2">◉ IMMUTABLE AUDIT LOG</text>
    <text x="660" y="0" fill="#5a7a90" letter-spacing="2">◉ OFFLINE RESILIENCE</text>
    <text x="890" y="0" fill="#5a7a90" letter-spacing="2">◉ REGIONAL DATA RESIDENCY</text>
  </g>
</svg>
