name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Write service account and set credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$SA_JSON" > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV
          echo "GOOGLE_CLOUD_PROJECT=tactical-command-center" >> $GITHUB_ENV
          python3 -c "import json; sa=json.load(open('/tmp/sa.json')); print('SA email:', sa['client_email']); print('SA project:', sa['project_id'])"

      - name: Test Firebase auth
        run: |
          firebase projects:list 2>&1 | tee /tmp/projects.txt
          echo "## firebase projects:list output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/projects.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting --project tactical-command-center --non-interactive 2>&1 | tee /tmp/deploy.txt
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "## Deploy Error" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/deploy.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa.json
