name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase Tools v12
        run: npm install -g firebase-tools@12

      - name: Check token
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "ERROR: FIREBASE_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "Token length: ${#FIREBASE_TOKEN}"
          firebase projects:list --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project tactical-command-center --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
