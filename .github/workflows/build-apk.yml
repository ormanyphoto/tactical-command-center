name: Build Android APK

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_SDK_ROOT

      - name: Copy app icons
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
            cp icon-192.png android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp icon-192.png android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done
          cp icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version=8.5

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/TacticalCommandCenter-v5.3.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TacticalCommandCenter-v5.3-Android
          path: android/app/build/outputs/apk/debug/TacticalCommandCenter-v5.3.apk
          retention-days: 90

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v5.3-${{ github.run_number }}
          name: "Tactical Command Center APK v5.3 (build ${{ github.run_number }})"
          body: |
            ## התקנה באנדרואיד
            1. הורד את **TacticalCommandCenter-v5.3.apk**
            2. פתח את הקובץ במכשיר
            3. אשר "התקנה ממקור לא מוכר"
            4. האפליקציה תפתח את https://tactical-command-center.web.app
          files: android/app/build/outputs/apk/debug/TacticalCommandCenter-v5.3.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
