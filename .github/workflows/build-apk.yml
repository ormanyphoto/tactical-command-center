name: Build Android APK

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_SDK_ROOT

      - name: Copy app icons
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
            cp icon-192.png android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp icon-192.png android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done
          cp icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Verify google-services.json
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "::error::android/app/google-services.json is missing. See android/SETUP.md for registration instructions."
            exit 1
          fi
          if grep -q "REPLACE_WITH_ANDROID_APP_ID" android/app/google-services.json; then
            echo "::warning::google-services.json still contains the placeholder mobilesdk_app_id — FCM will not work until you register the Android app in Firebase Console and replace the file. See android/SETUP.md."
          fi

      # Bootstrap a stable debug keystore so the APK signature doesn't change
      # between builds. Without this the TWA assetlinks SHA-256 would be
      # different every build and Digital Asset Links verification would fail,
      # causing the TWA to fall back to Chrome Custom Tabs (URL bar visible).
      - name: Bootstrap debug keystore
        id: keystore
        run: |
          KS_PATH=android/app/debug.keystore
          if [ ! -f "$KS_PATH" ]; then
            echo "Generating stable debug keystore..."
            keytool -genkeypair -v \
              -keystore "$KS_PATH" \
              -alias tactical-debug \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass tac-debug-key \
              -keypass tac-debug-key \
              -dname "CN=Tactical Command Center Debug, O=TacOps, C=IL"
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Using existing keystore"
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
          fi
          # Extract the SHA-256 fingerprint (keytool output format varies slightly;
          # we grep for the SHA256: line and take the colon-separated hex).
          SHA256=$(keytool -list -v \
            -keystore "$KS_PATH" \
            -alias tactical-debug \
            -storepass tac-debug-key 2>/dev/null \
            | awk '/SHA256:/ {print $2; exit}')
          echo "Certificate SHA-256: $SHA256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      # Ensure .well-known/assetlinks.json is present and contains the current
      # keystore's SHA-256. Firebase Hosting serves files from .well-known/
      # bypassing the SPA rewrite, so once committed the file is live.
      - name: Update assetlinks.json
        id: assetlinks
        run: |
          mkdir -p .well-known
          SHA256='${{ steps.keystore.outputs.sha256 }}'
          cat > .well-known/assetlinks.json <<EOF
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "com.tacops.commandcenter",
              "sha256_cert_fingerprints": ["$SHA256"]
            }
          }]
          EOF
          cat .well-known/assetlinks.json

      # If either the keystore or assetlinks.json is new/changed, commit them
      # back to the repo so the next build is deterministic and the next
      # Firebase deploy publishes the assetlinks.
      - name: Commit bootstrap artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f android/app/debug.keystore .well-known/assetlinks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(ci): bootstrap debug keystore + assetlinks.json"
            git push
          fi

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version=8.9

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/TacticalCommandCenter-v5.6.3.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TacticalCommandCenter-v5.6.3-Android
          path: android/app/build/outputs/apk/debug/TacticalCommandCenter-v5.6.3.apk
          retention-days: 90

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v5.6.3-${{ github.run_number }}
          name: "Tactical Command Center APK v5.6.3 (build ${{ github.run_number }})"
          body: |
            ## v5.6.3 — אפליקציית אנדרואיד נייטיב עם התראות חירום על מסך נעול

            **חדש:** קוד Kotlin נייטיב שמטפל ב-FCM ישירות, עם FullScreenIntent שמעיר את המסך ומציג פופאפ חירום אפילו כשהטלפון נעול — בדיוק כמו פיקוד העורף.

            ### התקנה
            1. הורד את **TacticalCommandCenter-v5.6.3.apk**
            2. פתח את הקובץ במכשיר
            3. אשר "התקנה ממקור לא מוכר"
            4. פתח את האפליקציה פעם אחת כדי לרשום את ה-FCM token
            5. שלח הודעת בדיקה ממכשיר אחר — המסך יידלק אוטומטית עם פופאפ חירום

            ### הרשאות שהאפליקציה מבקשת
            - `USE_FULL_SCREEN_INTENT` — הפעלת activity על מסך נעול
            - `WAKE_LOCK` — הדלקת המסך
            - `POST_NOTIFICATIONS` — תצוגת התראות
            - `VIBRATE` — רטט חירום
          files: android/app/build/outputs/apk/debug/TacticalCommandCenter-v5.6.3.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
