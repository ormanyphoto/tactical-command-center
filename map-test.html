<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>בדיקת Map ID — TCC</title>
<style>
  html,body{margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',Arial;background:#0d1014;color:#e8eff5;height:100%}
  #wrap{display:flex;flex-direction:column;height:100vh}
  #info{background:#0d1014;padding:10px 14px;border-bottom:2px solid #1a8c2e;font-size:13px;line-height:1.5;max-height:50vh;overflow:auto}
  #info b{color:#3dff52}
  #info code{background:#1c2430;padding:1px 5px;border-radius:3px;font-size:11px;color:#29c5f6;word-break:break-all}
  #map{flex:1;min-height:40vh;background:#1a2028}
  .status{padding:3px 8px;border-radius:4px;font-weight:700;display:inline-block;margin:2px 4px 2px 0;font-size:12px}
  .s-ok{background:#1a5a22;color:#3dff52}
  .s-fail{background:#5a1a1a;color:#ff6060}
  .s-pending{background:#3a3a1a;color:#ffc107}
  button{background:#1a8c2e;color:white;border:none;border-radius:4px;padding:6px 12px;font-weight:700;cursor:pointer;margin:4px 2px;font-family:inherit;font-size:12px}
  .log{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:#0a0d12;border:1px solid #1c2430;border-radius:4px;padding:6px 10px;margin-top:8px;max-height:180px;overflow:auto;white-space:pre-wrap;word-break:break-all}
  .log-err{color:#ff6060}
  .log-ok{color:#3dff52}
  .log-info{color:#8fb3d9}
</style>
</head>
<body>
<div id="wrap">
  <div id="info">
    <div><b>Map ID:</b> <code>5075a944af766b257648230b</code></div>
    <div><b>API Key:</b> <code>AIzaSyCdyxA1sTQxJdvFPeyRJ5wtdRehQ2EEtjo</code></div>
    <div><b>Domain:</b> <code id="dom"></code></div>
    <div style="margin-top:8px" id="status">
      <span class="status s-pending">⏳ מחכה ל-Google Maps API...</span>
    </div>
    <div style="margin-top:6px">
      <button onclick="testRotate()">🔄 סובב 90°</button>
      <button onclick="testTilt()">⛰️ Tilt 45°</button>
      <button onclick="resetView()">↩️ אפס</button>
    </div>
    <div class="log" id="log"></div>
  </div>
  <div id="map"></div>
</div>
<script>
let map;
const log = document.getElementById('log');
const status = document.getElementById('status');
document.getElementById('dom').textContent = location.hostname + location.pathname;

function logLine(msg, cls){
  const t = new Date().toLocaleTimeString('he-IL');
  const line = document.createElement('div');
  line.className = cls || 'log-info';
  line.textContent = '[' + t + '] ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// Google Maps calls this if auth fails (bad API key, referrer rejected, etc.)
window.gm_authFailure = () => {
  logLine('❌ gm_authFailure — ה-API Key נדחה. רוב הסיכויים: הגבלת דומיין או Maps JavaScript API לא מופעל.', 'log-err');
  status.innerHTML = '<span class="status s-fail">❌ API Key נדחה (gm_authFailure)</span>';
};

// Catch any JS errors from Google's code
window.addEventListener('error', e => {
  if (e.filename && e.filename.includes('maps.googleapis.com')){
    logLine('Maps JS error: ' + (e.message || e.error), 'log-err');
  }
});

// Timeout — if onMaps doesn't fire within 15s, something's wrong
setTimeout(() => {
  if (!map) {
    logLine('⚠️ Maps API לא נטען תוך 15 שניות. פתח את DevTools (F12) → Network → חפש maps/api/js — מה ה-status code?', 'log-err');
    status.innerHTML = '<span class="status s-fail">❌ Timeout — Maps לא נטען</span>';
  }
}, 15000);

function onMaps(){
  logLine('✅ Google Maps API נטען', 'log-ok');
  try {
    logLine('יוצר מפה עם mapId=5075a944af766b257648230b...');
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 32.0667, lng: 34.7818 },
      zoom: 14,
      mapId: '5075a944af766b257648230b',
      rotateControl: true,
      headingInteractionEnabled: true,
      gestureHandling: 'greedy',
      disableDefaultUI: false,
    });
    logLine('✅ מפה נוצרה בהצלחה', 'log-ok');

    google.maps.event.addListenerOnce(map, 'tilesloaded', () => {
      logLine('✅ tilesloaded — טיילים נטענו', 'log-ok');
      let rt = 'לא ידוע';
      try {
        if (google.maps.RenderingType && typeof map.getRenderingType === 'function') {
          const r = map.getRenderingType();
          logLine('renderingType raw: ' + String(r));
          if (r === google.maps.RenderingType.VECTOR) rt = 'VECTOR ✅';
          else if (r === google.maps.RenderingType.RASTER) rt = 'RASTER ❌';
          else rt = 'UNKNOWN (' + r + ')';
        } else {
          rt = 'getRenderingType לא קיים';
        }
      } catch(e){ rt = 'שגיאה: ' + e.message; }
      const okClass = rt.includes('VECTOR') ? 's-ok' : 's-fail';
      status.innerHTML = '<span class="status s-ok">מפה נטענה</span>' +
        '<span class="status ' + okClass + '">Rendering: ' + rt + '</span>';
      if (rt.includes('VECTOR')){
        logLine('🎉 מצוין — הסיבוב אמור לעבוד. נסה "סובב 90°" או שתי אצבעות.', 'log-ok');
      } else {
        logLine('⚠️ ה-Map ID לא מחזיר Vector. בדוק ב-Cloud Console שהטעינת עודכנה.', 'log-err');
      }
    });

    google.maps.event.addListener(map, 'heading_changed', () => {
      const h = Math.round(map.getHeading() || 0);
      logLine('heading: ' + h + '°', 'log-ok');
    });

  } catch(e){
    logLine('❌ כשל ביצירת מפה: ' + e.message, 'log-err');
    status.innerHTML = '<span class="status s-fail">❌ יצירת מפה נכשלה</span>';
  }
}

function testRotate(){
  if (!map) { logLine('אין מפה — חכה שתטען', 'log-err'); return; }
  const cur = map.getHeading() || 0;
  const target = cur + 90;
  logLine('setHeading(' + target + '°) ...');
  try { map.setHeading(target); } catch(e){ logLine('setHeading error: ' + e.message, 'log-err'); }
  setTimeout(() => {
    const after = Math.round(map.getHeading() || 0);
    if (Math.abs(after - target) < 5){
      logLine('✅ סיבוב הצליח → ' + after + '°', 'log-ok');
    } else {
      logLine('❌ הסיבוב לא זז. Actual: ' + after + '°. ה-Map ID כנראה Raster או הגדרה לא נטענה.', 'log-err');
    }
  }, 600);
}
function testTilt(){
  if (!map) return;
  logLine('setTilt(45°) ...');
  try { map.setTilt(45); } catch(e){ logLine('setTilt error: ' + e.message, 'log-err'); }
}
function resetView(){
  if (!map) return;
  map.setHeading(0); map.setTilt(0);
  logLine('אופס');
}

// Load Maps script
const s = document.createElement('script');
s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCdyxA1sTQxJdvFPeyRJ5wtdRehQ2EEtjo&libraries=geometry&language=he&region=IL&callback=onMaps&loading=async';
s.async = true; s.defer = true;
s.onerror = () => {
  logLine('❌ כשל בטעינת סקריפט Maps — רשת/CORS/domain restriction', 'log-err');
  status.innerHTML = '<span class="status s-fail">❌ Script load failed</span>';
};
logLine('טוען maps.googleapis.com/maps/api/js ...');
document.head.appendChild(s);
</script>
</body>
</html>
