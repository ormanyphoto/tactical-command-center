<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>בדיקת Map ID — TCC</title>
<style>
  html,body{margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',Arial;background:#0d1014;color:#e8eff5;height:100%}
  #wrap{display:flex;flex-direction:column;height:100vh}
  #info{background:#0d1014;padding:10px 14px;border-bottom:2px solid #1a8c2e;font-size:13px;line-height:1.5;max-height:55vh;overflow:auto}
  #info b{color:#3dff52}
  #info code{background:#1c2430;padding:1px 5px;border-radius:3px;font-size:11px;color:#29c5f6;word-break:break-all}
  .maps{display:flex;flex:1;min-height:40vh;border-top:1px solid #1a8c2e}
  .mapbox{flex:1;position:relative;border-right:1px solid #1a8c2e;min-width:0}
  .mapbox:last-child{border-right:none}
  .mapbox > .map{position:absolute;inset:0;background:#202830}
  .mapbox > .cap{position:absolute;top:6px;left:6px;right:6px;background:rgba(0,0,0,0.65);color:#fff;padding:4px 8px;font-size:11px;border-radius:4px;z-index:5;font-weight:700}
  button{background:#1a8c2e;color:white;border:none;border-radius:4px;padding:6px 12px;font-weight:700;cursor:pointer;margin:4px 2px;font-family:inherit;font-size:12px}
  .log{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:#0a0d12;border:1px solid #1c2430;border-radius:4px;padding:6px 10px;margin-top:8px;max-height:280px;overflow:auto;white-space:pre-wrap;word-break:break-all}
  .log-err{color:#ff6060}
  .log-ok{color:#3dff52}
  .log-info{color:#8fb3d9}
  .log-warn{color:#ffc107}
</style>
</head>
<body>
<div id="wrap">
  <div id="info">
    <div><b>Map ID:</b> <code>5075a944af766b257648230b</code></div>
    <div id="webgl-status" style="margin-top:4px"></div>
    <div style="margin-top:6px">
      <button onclick="createAsRaster()">🔁 צור B כ-RASTER</button>
      <button onclick="inspectB()">🔍 בדוק DOM</button>
      <button onclick="resizeMapB()">📐 טריגר resize</button>
      <button onclick="location.reload()">↻ רענן</button>
    </div>
    <div class="log" id="log"></div>
  </div>
  <div class="maps">
    <div class="mapbox"><div class="cap">WITHOUT mapId</div><div class="map" id="map-nomapid"></div></div>
    <div class="mapbox"><div class="cap">WITH mapId</div><div class="map" id="map-withmapid"></div></div>
  </div>
</div>
<script>
let mapA, mapB;
const log = document.getElementById('log');

function logLine(msg, cls){
  const t = new Date().toLocaleTimeString('he-IL');
  const line = document.createElement('div');
  line.className = cls || 'log-info';
  line.textContent = '[' + t + '] ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ── WebGL capability check ─────────────────────────────────────────────
// FIX: use SEPARATE canvases for webgl vs webgl2. Calling getContext
// with a different type on the same canvas always returns null after
// the first call — the previous version reported "WebGL1 only" on
// every device because of this bug.
function checkWebGL(){
  const c2 = document.createElement('canvas');
  let gl2 = null;
  try { gl2 = c2.getContext('webgl2'); } catch(_){}
  const c1 = document.createElement('canvas');
  let gl1 = null;
  try { gl1 = c1.getContext('webgl') || c1.getContext('experimental-webgl'); } catch(_){}
  const out = document.getElementById('webgl-status');
  let status = '';
  if (gl2) {
    let vendor = '?', renderer = '?';
    try {
      const dbg = gl2.getExtension('WEBGL_debug_renderer_info');
      if (dbg) {
        vendor = gl2.getParameter(dbg.UNMASKED_VENDOR_WEBGL);
        renderer = gl2.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
      } else {
        vendor = gl2.getParameter(gl2.VENDOR);
        renderer = gl2.getParameter(gl2.RENDERER);
      }
    } catch(_){}
    status = '<span style="color:#3dff52">✅ WebGL2 תומך</span> · ' + vendor + ' · ' + renderer;
    logLine('WebGL2 OK: ' + vendor + ' / ' + renderer, 'log-ok');
  } else if (gl1) {
    status = '<span style="color:#ffc107">⚠️ WebGL1 בלבד (Vector דורש WebGL2)</span>';
    logLine('WebGL1 only — Vector requires WebGL2!', 'log-warn');
  } else {
    status = '<span style="color:#ff6060">❌ אין WebGL!</span>';
    logLine('NO WebGL — vector tiles cannot render!', 'log-err');
  }
  out.innerHTML = status;
  return !!gl2;
}
checkWebGL();

window.gm_authFailure = () => logLine('❌ gm_authFailure', 'log-err');
window.addEventListener('error', e => {
  if (e.filename && e.filename.includes('maps.googleapis.com')){
    logLine('Maps error: ' + (e.message || e.error), 'log-err');
  }
});

function onMaps(){
  logLine('✅ Maps API ' + (google.maps.version || '?'), 'log-ok');
  // Map A — no mapId
  try {
    mapA = new google.maps.Map(document.getElementById('map-nomapid'), {
      center: { lat: 32.0667, lng: 34.7818 },
      zoom: 13,
      disableDefaultUI: true,
    });
    google.maps.event.addListenerOnce(mapA, 'tilesloaded', () => logLine('✅ A: tilesloaded', 'log-ok'));
  } catch(e){ logLine('A err: ' + e.message, 'log-err'); }
  // Map B — mapId only, minimal config
  try {
    logLine('מפה B: mapId minimal...');
    mapB = new google.maps.Map(document.getElementById('map-withmapid'), {
      center: { lat: 32.0667, lng: 34.7818 },
      zoom: 13,
      mapId: '5075a944af766b257648230b',
      disableDefaultUI: true,
    });
    google.maps.event.addListenerOnce(mapB, 'tilesloaded', () => {
      logLine('✅ B: tilesloaded', 'log-ok');
      setTimeout(() => { inspectB(); }, 500);
    });
    // Log ALL events on map B for diagnosis
    ['idle','bounds_changed','center_changed','zoom_changed','projection_changed','maptypeid_changed','renderingtype_changed','heading_changed'].forEach(ev => {
      google.maps.event.addListener(mapB, ev, () => logLine('B: ' + ev, 'log-info'));
    });
    setTimeout(() => {
      if (mapB.getRenderingType){
        const r = mapB.getRenderingType();
        logLine('B.getRenderingType [3s]: ' + r, 'log-info');
      }
    }, 3000);
  } catch(e){ logLine('B err: ' + e.message, 'log-err'); }
}

function createAsRaster(){
  logLine('מחדש את B כ-RASTER (ללא mapId)...', 'log-warn');
  const el = document.getElementById('map-withmapid');
  el.innerHTML = '';
  try {
    mapB = new google.maps.Map(el, {
      center: { lat: 32.0667, lng: 34.7818 },
      zoom: 13,
      disableDefaultUI: true,
    });
    google.maps.event.addListenerOnce(mapB, 'tilesloaded', () => logLine('✅ B raster: tilesloaded — אם זה עובד, הבעיה ספציפית ל-vector', 'log-ok'));
  } catch(e){ logLine('raster err: ' + e.message, 'log-err'); }
}

function resizeMapB(){
  if (!mapB) return;
  try {
    google.maps.event.trigger(mapB, 'resize');
    logLine('resize triggered', 'log-info');
  } catch(e){ logLine('resize err: ' + e.message, 'log-err'); }
}

function inspectB(){
  if (!mapB) return logLine('אין B', 'log-err');
  const el = document.getElementById('map-withmapid');
  const canvases = el.querySelectorAll('canvas').length;
  const imgs = el.querySelectorAll('img').length;
  const divs = el.querySelectorAll('div').length;
  logLine('B DOM: canvases=' + canvases + ' imgs=' + imgs + ' divs=' + divs);
  if (canvases === 0) logLine('⚠️ אין canvas! WebGL לא מתחיל.', 'log-warn');
  // Check for Google Maps specific error overlays
  const errOverlay = el.querySelector('.gm-err-container, .gm-err-content');
  if (errOverlay) logLine('⚠️ Google error overlay: ' + errOverlay.textContent.slice(0, 200), 'log-err');
  logLine('B center: ' + mapB.getCenter() + ' zoom: ' + mapB.getZoom());
}

const s = document.createElement('script');
s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCdyxA1sTQxJdvFPeyRJ5wtdRehQ2EEtjo&libraries=geometry&language=he&region=IL&callback=onMaps&v=weekly&loading=async';
s.async = true; s.defer = true;
s.onerror = () => logLine('❌ script load err', 'log-err');
document.head.appendChild(s);
</script>
</body>
</html>
