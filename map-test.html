<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>בדיקת Map ID — TCC</title>
<style>
  html,body{margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',Arial;background:#0d1014;color:#e8eff5;height:100%}
  #wrap{display:flex;flex-direction:column;height:100vh}
  #info{background:#0d1014;padding:10px 14px;border-bottom:2px solid #1a8c2e;font-size:13px;line-height:1.5;max-height:55vh;overflow:auto}
  #info b{color:#3dff52}
  #info code{background:#1c2430;padding:1px 5px;border-radius:3px;font-size:11px;color:#29c5f6;word-break:break-all}
  .maps{display:flex;flex:1;min-height:40vh;border-top:1px solid #1a8c2e}
  .mapbox{flex:1;position:relative;border-right:1px solid #1a8c2e;min-width:0}
  .mapbox:last-child{border-right:none}
  .mapbox > .map{position:absolute;inset:0;background:#202830}
  .mapbox > .cap{position:absolute;top:6px;left:6px;right:6px;background:rgba(0,0,0,0.65);color:#fff;padding:4px 8px;font-size:11px;border-radius:4px;z-index:5;font-weight:700}
  button{background:#1a8c2e;color:white;border:none;border-radius:4px;padding:6px 12px;font-weight:700;cursor:pointer;margin:4px 2px;font-family:inherit;font-size:12px}
  .log{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:#0a0d12;border:1px solid #1c2430;border-radius:4px;padding:6px 10px;margin-top:8px;max-height:250px;overflow:auto;white-space:pre-wrap;word-break:break-all}
  .log-err{color:#ff6060}
  .log-ok{color:#3dff52}
  .log-info{color:#8fb3d9}
  .log-warn{color:#ffc107}
</style>
</head>
<body>
<div id="wrap">
  <div id="info">
    <div><b>Map ID:</b> <code>5075a944af766b257648230b</code></div>
    <div><b>API Key:</b> <code>AIzaSyCdyxA1sTQxJdvFPeyRJ5wtdRehQ2EEtjo</code></div>
    <div><b>Domain:</b> <code id="dom"></code></div>
    <div style="margin-top:6px">
      <button onclick="inspectB()">🔍 בדוק סטטוס מפה B</button>
      <button onclick="testRotate()">🔄 סובב 90°</button>
      <button onclick="location.reload()">↻ רענן</button>
    </div>
    <div class="log" id="log"></div>
  </div>
  <div class="maps">
    <div class="mapbox"><div class="cap">WITHOUT mapId</div><div class="map" id="map-nomapid"></div></div>
    <div class="mapbox"><div class="cap">WITH mapId + renderingType:VECTOR</div><div class="map" id="map-withmapid"></div></div>
  </div>
</div>
<script>
let mapA, mapB;
const log = document.getElementById('log');
document.getElementById('dom').textContent = location.hostname + location.pathname;

function logLine(msg, cls){
  const t = new Date().toLocaleTimeString('he-IL');
  const line = document.createElement('div');
  line.className = cls || 'log-info';
  line.textContent = '[' + t + '] ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

window.gm_authFailure = () => {
  logLine('❌ gm_authFailure — ה-API Key נדחה', 'log-err');
};
window.addEventListener('error', e => {
  if (e.filename && e.filename.includes('maps.googleapis.com')){
    logLine('Maps JS error: ' + (e.message || e.error), 'log-err');
  }
});

// Intercept fetch to spot tile failures
const _origFetch = window.fetch;
window.fetch = function(url, ...rest){
  const u = String(url);
  if (u.includes('googleapis.com') && (u.includes('tile') || u.includes('maptile') || u.includes('2mm'))){
    return _origFetch.apply(this, arguments).then(r => {
      if (!r.ok) logLine('tile fetch ' + r.status + ': ' + u.slice(0, 120), 'log-err');
      return r;
    }).catch(e => {
      logLine('tile fetch FAIL: ' + e.message, 'log-err');
      throw e;
    });
  }
  return _origFetch.apply(this, arguments);
};

function onMaps(){
  logLine('✅ Google Maps API נטען, version = ' + (google.maps.version || '?'), 'log-ok');
  logLine('RenderingType enum: VECTOR=' + google.maps.RenderingType?.VECTOR + ', RASTER=' + google.maps.RenderingType?.RASTER);
  // Map A: no mapId
  try {
    mapA = new google.maps.Map(document.getElementById('map-nomapid'), {
      center: { lat: 32.0667, lng: 34.7818 },
      zoom: 13,
      gestureHandling: 'greedy',
      disableDefaultUI: true,
    });
    google.maps.event.addListenerOnce(mapA, 'tilesloaded', () => {
      logLine('✅ A: tilesloaded', 'log-ok');
    });
  } catch(e){
    logLine('❌ A: ' + e.message, 'log-err');
  }
  // Map B: with mapId + forced VECTOR
  try {
    const opts = {
      center: { lat: 32.0667, lng: 34.7818 },
      zoom: 13,
      mapId: '5075a944af766b257648230b',
      gestureHandling: 'greedy',
      disableDefaultUI: true,
      rotateControl: true,
      headingInteractionEnabled: true,
    };
    if (google.maps.RenderingType) {
      opts.renderingType = google.maps.RenderingType.VECTOR;
    }
    if (google.maps.ColorScheme) {
      opts.colorScheme = google.maps.ColorScheme.LIGHT;
    }
    logLine('מפה B: new google.maps.Map(...) עם opts:');
    logLine(JSON.stringify(Object.keys(opts)));
    mapB = new google.maps.Map(document.getElementById('map-withmapid'), opts);
    logLine('✅ B: נוצרה', 'log-ok');

    // Check rendering type immediately
    setTimeout(() => {
      try {
        const rt = mapB.getRenderingType && mapB.getRenderingType();
        logLine('B.getRenderingType() [2s]: ' + rt + ' (VECTOR=2, RASTER=1)');
      } catch(e){ logLine('getRenderingType err: ' + e.message, 'log-err'); }
    }, 2000);

    google.maps.event.addListenerOnce(mapB, 'tilesloaded', () => {
      logLine('✅ B: tilesloaded', 'log-ok');
      try {
        const r = mapB.getRenderingType();
        const rn = r === google.maps.RenderingType.VECTOR ? 'VECTOR' : (r === google.maps.RenderingType.RASTER ? 'RASTER' : String(r));
        logLine('B Rendering = ' + rn, rn === 'VECTOR' ? 'log-ok' : 'log-err');
      } catch(e){}
    });
    google.maps.event.addListener(mapB, 'renderingtype_changed', () => {
      const r = mapB.getRenderingType();
      logLine('B renderingtype_changed → ' + r, 'log-warn');
    });
    google.maps.event.addListenerOnce(mapB, 'idle', () => {
      logLine('B: idle event fired', 'log-info');
    });
  } catch(e){
    logLine('❌ B: ' + e.message, 'log-err');
  }
}

function inspectB(){
  if (!mapB) { logLine('אין mapB', 'log-err'); return; }
  const el = document.getElementById('map-withmapid');
  const childs = el.children.length;
  const canvases = el.querySelectorAll('canvas').length;
  const imgs = el.querySelectorAll('img').length;
  const divs = el.querySelectorAll('div').length;
  logLine('B DOM: children=' + childs + ' canvases=' + canvases + ' imgs=' + imgs + ' divs=' + divs);
  try {
    logLine('B center: ' + mapB.getCenter().toString() + ' zoom: ' + mapB.getZoom());
    logLine('B mapTypeId: ' + mapB.getMapTypeId());
    logLine('B renderingType: ' + (mapB.getRenderingType && mapB.getRenderingType()));
  } catch(e){ logLine('inspect err: ' + e.message, 'log-err'); }
}

function testRotate(){
  if (!mapB) return;
  const cur = mapB.getHeading() || 0;
  try { mapB.setHeading(cur + 90); } catch(e){ logLine('setHeading: ' + e.message, 'log-err'); }
  setTimeout(() => {
    const after = Math.round(mapB.getHeading() || 0);
    logLine('סיבוב: cur=' + cur + ' → after=' + after + (Math.abs(after - (cur + 90)) < 5 ? ' ✅' : ' ❌'), Math.abs(after - (cur + 90)) < 5 ? 'log-ok' : 'log-err');
  }, 700);
}

// Load Maps — force weekly version + beta to ensure vector support
const s = document.createElement('script');
s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCdyxA1sTQxJdvFPeyRJ5wtdRehQ2EEtjo&libraries=geometry&language=he&region=IL&callback=onMaps&v=weekly&loading=async';
s.async = true; s.defer = true;
s.onerror = () => logLine('❌ כשל בטעינת סקריפט', 'log-err');
logLine('טוען v=weekly ...');
document.head.appendChild(s);
</script>
</body>
</html>
