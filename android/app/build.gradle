plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.tacops.commandcenter'
    compileSdk 34

    // Stable debug keystore committed to the repo. The build-apk workflow
    // bootstraps this file on first run (keytool → android/app/debug.keystore)
    // and commits both the keystore and the matching .well-known/assetlinks.json
    // back to the repo. Every subsequent build uses the committed keystore, so
    // the APK signature stays stable → Digital Asset Links verification passes
    // → the TWA runs in true full-screen (no browser address bar).
    signingConfigs {
        debugStable {
            def ks = file('debug.keystore')
            if (ks.exists()) {
                storeFile ks
                storePassword 'tac-debug-key'
                keyAlias 'tactical-debug'
                keyPassword 'tac-debug-key'
            }
        }
    }

    defaultConfig {
        applicationId "com.tacops.commandcenter"
        minSdk 23
        targetSdk 34
        versionCode 8
        versionName "5.5"
    }

    buildTypes {
        debug {
            // Use our stable keystore if it exists; otherwise fall back to
            // Android's default auto-generated debug keystore.
            def ks = file('debug.keystore')
            if (ks.exists()) {
                signingConfig signingConfigs.debugStable
            }
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'

    // Firebase — BOM manages all versions
    implementation platform('com.google.firebase:firebase-bom:33.1.2')
    implementation 'com.google.firebase:firebase-messaging-ktx'
    implementation 'com.google.firebase:firebase-database-ktx'
}
